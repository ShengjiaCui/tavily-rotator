name: Build

# 跨平台编译验证 + 产出可分发二进制。
# 触发:push 到 main、tag(v*)、PR。
#
# 三个平台 matrix:macOS / Linux / Windows
# 每个 build 成功后,tag 时上传二进制到 Release。

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 一个平台失败不影响其他
      matrix:
        include:
          # macOS: Apple Silicon(主)+ 在同一 runner 上 cross-compile x86_64
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
            artifact: tavily-rotator-macos-aarch64
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
            artifact: tavily-rotator-macos-x86_64
            cross: true  # 在 aarch64 runner 上交叉编译 x86_64
          # Linux: x86_64 + aarch64
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            artifact: tavily-rotator-linux-x86_64
          - os: ubuntu-22.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            artifact: tavily-rotator-linux-aarch64
          # Windows: x86_64
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            artifact: tavily-rotator-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run selftest (Unix only)
        if: runner.os != 'Windows'
        run: |
          # 只验证能跑起来 + --help,完整 selftest 需要 keys.toml
          ./target/${{ matrix.target }}/release/tavily-rotator --help 2>&1 || true

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/tavily-rotator artifact/
          cp -r scripts artifact/
          cp README.md artifact/
          cd artifact && tar czf ../${{ matrix.artifact }}.tar.gz .

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact
          Copy-Item "target/${{ matrix.target }}/release/tavily-rotator.exe" -Destination "artifact/"
          Copy-Item -Recurse "scripts" -Destination "artifact/"
          Copy-Item "README.md" -Destination "artifact/"
          Compress-Archive -Path "artifact/*" -DestinationPath "../${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
